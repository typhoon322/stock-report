name: 📊 Weekly Report
on:
  schedule:
    - cron: '45 7 * * 5'  # 15:45 PM BJT Friday
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Collect weekly data
        run: python cloud_scripts/cloud_weekly.py
      - name: Phase II Auto Training (30-day trigger)
        run: python -m rotation.phase2.runner || echo "⚠ Insufficient data — skipping"
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/weekly_data.json
          git diff --staged --quiet || git commit -m "📊 Weekly data $(date +%Y-%m-%d)"
          git push
