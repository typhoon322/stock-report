name: 🌤️ Midday Report
on:
  schedule:
    - cron: '35 3 * * 1-5'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate report
        run: python cloud_scripts/cloud_midday.py
      - name: Daily Archive (raw + signal + trade)
        run: python -m rotation.archive.runner
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📊 Midday report $(date +%Y-%m-%d)"
          git push
